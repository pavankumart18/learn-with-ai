<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Course Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="data.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07090F;
  --bg2:#0C1020;
  --bg3:#111827;
  --surface:rgba(13,18,36,0.92);
  --surface2:rgba(17,24,48,0.88);
  --border:rgba(148,163,255,0.1);
  --border2:rgba(148,163,255,0.22);
  --primary:#818CF8;
  --primary-d:#4F46E5;
  --primary-glow:rgba(129,140,248,0.3);
  --gold:#F59E0B;
  --teal:#2DD4BF;
  --teal-glow:rgba(45,212,191,0.2);
  --red:#F87171;
  --green:#34D399;
  --text:#EEF0FF;
  --text2:#8892B8;
  --text3:#4A5578;
  --r-xl:28px;
  --r-lg:20px;
  --r-md:14px;
  --r-sm:10px;
  --shadow:0 20px 60px rgba(0,0,0,.55),0 2px 12px rgba(129,140,248,.06);
  --shadow-lg:0 32px 80px rgba(0,0,0,.65),0 4px 24px rgba(129,140,248,.14);
  --ease:cubic-bezier(.4,0,.2,1);
}

html{scroll-behavior:smooth}

body{
  font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
  color:var(--text);
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% -5%,rgba(79,70,229,.18) 0%,transparent 60%),
    radial-gradient(ellipse 45% 35% at 10% 100%,rgba(20,184,166,.1) 0%,transparent 60%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(148,163,255,.2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,255,.35)}

a{text-decoration:none;color:inherit}

/* ---- PAGE ---- */
.page{max-width:1440px;margin:0 auto;padding:22px 28px 72px}

/* ---- TOP ---- */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
  padding:14px 20px;
  background:rgba(10,14,28,.8);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
}

.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-weight:700;
  font-size:13px;
  color:var(--text2);
  transition:color .18s;
  letter-spacing:.02em;
}

.back::before{
  content:'←';
  font-size:16px;
  transition:transform .18s var(--ease);
}

.back:hover{color:var(--primary)}
.back:hover::before{transform:translateX(-3px)}

.muted{color:var(--text2);line-height:1.75}

/* ---- LAYOUT ---- */
.layout{
  display:grid;
  grid-template-columns:300px minmax(0,1fr);
  gap:20px;
  align-items:start;
}

/* ---- PANEL (shared) ---- */
.panel{
  background:var(--surface);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow);
}

/* ---- SIDEBAR ---- */
.side{
  position:sticky;
  top:20px;
  align-self:start;
  max-height:calc(100vh - 40px);
  overflow-y:auto;
  padding:20px;
}

.side::-webkit-scrollbar{width:4px}
.side::-webkit-scrollbar-thumb{background:rgba(148,163,255,.15);border-radius:99px}

.thumb{
  aspect-ratio:16/9;
  border-radius:var(--r-lg);
  overflow:hidden;
  background:linear-gradient(135deg,#0D1830,#1A2540);
  margin-bottom:16px;
}

.thumb img{width:100%;height:100%;object-fit:cover;display:block}

.fallback{
  height:100%;
  display:grid;
  place-items:center;
  font-family:'Playfair Display',Georgia,serif;
  font-size:28px;
  font-weight:700;
  color:rgba(129,140,248,.4);
}

.pill,.tab,.pill2{display:inline-flex;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.pill{padding:6px 12px}

.side h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:22px;
  font-weight:700;
  line-height:1.2;
  margin:14px 0 14px;
  color:var(--text);
  letter-spacing:-.01em;
}

/* Meta boxes */
.meta{display:grid;gap:8px;margin:0 0 16px}

.box{
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  border-radius:var(--r-md);
  padding:12px 14px;
  transition:border-color .2s;
}

.box:hover{border-color:var(--border2)}

.ml{
  display:block;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--text3);
  margin-bottom:4px;
}

.box > :not(.ml){
  font-size:13px;
  font-weight:600;
  color:var(--text);
}

/* Buttons */
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}

.btn{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  padding:10px 16px;
  border-radius:var(--r-md);
  font-weight:700;
  font-size:13px;
  font-family:inherit;
  transition:all .2s var(--ease);
  cursor:pointer;
  border:none;
  text-decoration:none;
}

.btn.dark{
  background:var(--primary);
  color:#fff;
  box-shadow:0 4px 20px var(--primary-glow);
}

.btn.dark:hover{
  background:#6366F1;
  transform:translateY(-2px);
  box-shadow:0 8px 28px var(--primary-glow);
}

.btn.soft{
  background:rgba(129,140,248,.12);
  color:var(--primary);
  border:1px solid rgba(129,140,248,.2);
}

.btn.soft:hover{
  background:rgba(129,140,248,.2);
  transform:translateY(-2px);
}

/* Chapter rail */
.rail{margin-top:16px}

.rail h3{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--text3);
  margin-bottom:10px;
}

.jump{
  display:block;
  padding:10px 12px;
  border-radius:var(--r-sm);
  background:rgba(255,255,255,.02);
  border:1px solid transparent;
  margin-bottom:6px;
  cursor:pointer;
  transition:all .18s var(--ease);
}

.jump:hover{
  background:rgba(129,140,248,.08);
  border-color:rgba(129,140,248,.18);
  transform:translateX(3px);
}

.jump .time{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:600;
  color:var(--primary);
  margin-bottom:3px;
}

.jump > :last-child{font-size:13px;font-weight:600;color:var(--text2);line-height:1.35}

/* ---- MAIN CONTENT ---- */
.content{padding:0;overflow:hidden}

/* Player box */
.player-box{
  padding:0;
  border-bottom:1px solid var(--border);
}

.player-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  padding:18px 22px 14px;
}

.player-head strong{font-size:14px;font-weight:700;color:var(--text)}

.player-stack{padding:0 0 0}

.embed{border-radius:0;overflow:hidden;background:#0A0E18}
.embed iframe{width:100%;aspect-ratio:16/9;border:0;display:block}

.main-embed{background:#0A0E18}
.main-embed #yt-player{width:100%;aspect-ratio:16/9;min-height:380px;background:#0A0E18}
.main-embed #yt-player iframe{width:100%;height:100%;display:block}

/* Lecture overview bar */
.content > .box:not(.player-box){
  border:none;
  border-bottom:1px solid var(--border);
  border-radius:0;
  padding:18px 22px;
  background:rgba(129,140,248,.04);
}

.content > .box:not(.player-box) > :first-child{
  font-size:13px;
  font-weight:700;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
}

/* ---- TABS ---- */
.tabs{
  display:flex;
  gap:0;
  flex-wrap:nowrap;
  overflow-x:auto;
  padding:0 22px;
  border-bottom:1px solid var(--border);
  background:rgba(7,9,15,.5);
  scrollbar-width:none;
}

.tabs::-webkit-scrollbar{display:none}

.tab{
  display:inline-flex;
  padding:14px 16px;
  border-radius:0;
  font-size:12px;
  font-weight:700;
  font-family:inherit;
  letter-spacing:.06em;
  border:none;
  border-bottom:2px solid transparent;
  background:transparent;
  color:var(--text3);
  cursor:pointer;
  transition:all .18s var(--ease);
  white-space:nowrap;
  flex-shrink:0;
}

.tab:hover{color:var(--text2);border-bottom-color:rgba(129,140,248,.3)}

.tab.active{
  color:var(--primary);
  border-bottom-color:var(--primary);
  background:transparent;
}

/* ---- PANES ---- */
.pane{display:none;padding:28px 28px 32px;animation:paneIn .25s var(--ease)}
.pane.active{display:block}

@keyframes paneIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Section headings inside panes */
.section{margin-bottom:28px}
.section h2{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(22px,3vw,32px);
  font-weight:700;
  letter-spacing:-.01em;
  color:var(--text);
  margin:0 0 8px;
}
.section .muted{font-size:14px}

/* Two-column grid inside panes */
.two{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

/* Generic card items */
.item{
  padding:20px;
  border-radius:var(--r-lg);
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  transition:border-color .2s var(--ease);
}

.item:hover{border-color:var(--border2)}

.item h3{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;
  font-weight:700;
  color:var(--text);
  margin:0 0 10px;
  line-height:1.35;
}

.desc{font-size:14px;color:var(--text2);line-height:1.72}

.mono{font-family:'JetBrains Mono',monospace}

.pill2{padding:6px 12px;background:rgba(129,140,248,.1);color:var(--primary);border:1px solid rgba(129,140,248,.15)}

/* ---- TRANSCRIPT ---- */
.ttools{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:18px;
}

.ttools input{
  width:min(100%,360px);
  padding:12px 16px;
  border-radius:var(--r-md);
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  color:var(--text);
  font:inherit;
  font-size:14px;
  transition:all .2s var(--ease);
  outline:none;
}

.ttools input::placeholder{color:var(--text3)}
.ttools input:focus{border-color:var(--border2);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px var(--primary-glow)}

.tlist{display:grid;gap:10px;max-height:62vh;overflow-y:auto;padding-right:6px}
.tlist::-webkit-scrollbar{width:4px}
.tlist::-webkit-scrollbar-track{background:transparent}
.tlist::-webkit-scrollbar-thumb{background:rgba(148,163,255,.2);border-radius:99px}
.tlist::-webkit-scrollbar-thumb:hover{background:rgba(148,163,255,.35)}

.seg{display:grid;grid-template-columns:82px minmax(0,1fr);gap:12px;cursor:pointer;border-radius:var(--r-md);transition:background .15s}
.seg:hover .item{border-color:rgba(129,140,248,.25);background:rgba(129,140,248,.04)}

.seg.hit .item,.seg.active-now .item{
  border-color:rgba(129,140,248,.35);
  box-shadow:0 0 0 3px rgba(129,140,248,.1);
  background:rgba(129,140,248,.06);
}

.seg.active-now .time{color:var(--teal)!important}
.seg.active-now .item{border-color:rgba(45,212,191,.35);box-shadow:0 0 0 3px rgba(45,212,191,.1);background:rgba(45,212,191,.04)}

.seg .item{padding:12px 14px}
.seg .time{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:600;
  color:var(--primary);
  display:block;
}

/* ---- FLASHCARDS ---- */
.stage{
  min-height:240px;
  display:grid;
  place-items:center;
  padding:28px 24px;
  border-radius:var(--r-lg);
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  text-align:center;
  transition:all .24s var(--ease);
}

.stage > div{width:100%}
.stage .muted{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.flip-wrap{width:100%;perspective:1400px}
.flip-card{position:relative;width:100%;min-height:252px;transform-style:preserve-3d;transition:transform .62s cubic-bezier(.2,.7,.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(17,24,48,.96),rgba(10,14,28,.98));padding:24px 22px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 18px 40px rgba(0,0,0,.28)}
.flip-back{transform:rotateY(180deg)}
.flip-meta{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;color:var(--text2)}
.flip-main{font-size:18px;line-height:1.65;color:var(--text);font-weight:600}
.flip-help{margin-top:16px;font-size:13px;color:var(--text2)}
.flip-hint{margin-top:14px;font-size:13px;color:var(--text2)}

/* ---- QUIZ ---- */
.opt{display:grid;gap:10px}

.obtn{
  padding:14px 16px;
  border-radius:var(--r-md);
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  text-align:left;
  font:inherit;
  font-size:14px;
  color:var(--text);
  cursor:pointer;
  transition:all .18s var(--ease);
}

.obtn:hover:not(:disabled){
  background:rgba(129,140,248,.08);
  border-color:rgba(129,140,248,.28);
  transform:translateX(3px);
}

.obtn.ok{
  border-color:rgba(52,211,153,.45);
  background:rgba(52,211,153,.1);
  color:var(--green);
}

.obtn.no{
  border-color:rgba(248,113,113,.45);
  background:rgba(248,113,113,.08);
  color:var(--red);
}

.obtn:disabled{cursor:default;transform:none}

.exp{
  display:none;
  margin-top:14px;
  padding:16px 18px;
  border-radius:var(--r-md);
  background:rgba(129,140,248,.07);
  border:1px solid rgba(129,140,248,.18);
  color:var(--text2);
  line-height:1.7;
  font-size:14px;
}

/* ---- CONCEPT GRAPH ---- */
#vg{
  height:520px;
  border-radius:var(--r-lg);
  border:1px solid var(--border);
  background:
    radial-gradient(ellipse 65% 55% at 50% 50%,rgba(129,140,248,.04),transparent),
    linear-gradient(180deg,#0C1220,#080E1A);
  overflow:hidden;
}

#vg svg{width:100%;height:100%;display:block}

/* ---- CHIPS ---- */
.chips{display:flex;gap:8px;flex-wrap:wrap}

/* ---- ROW ---- */
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ---- SEEK LINKS ---- */
.seek-link{cursor:pointer}

/* ---- STUDY GUIDE ---- */
.sg-section{margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--border)}
.sg-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sg-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sg-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border)}
.sg-title{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
.sg-sub{font-size:13px;color:var(--text2);line-height:1.5}
.prose{color:var(--text2);line-height:1.85;font-size:14px;padding:28px;border-radius:var(--r-lg);border:1px solid var(--border);background:rgba(255,255,255,.025)}
.prose p{margin-bottom:14px}
.prose p:last-child{margin-bottom:0}
.prose-h1{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:var(--text);margin:28px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border);line-height:1.2}
.prose-h2{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:var(--text);margin:24px 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(148,163,255,.08)}
.prose-h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin:18px 0 8px}
.prose .prose-h1:first-child,.prose .prose-h2:first-child,.prose .prose-h3:first-child{margin-top:0}
.prose-hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.prose-bq{border-left:3px solid var(--primary);margin:14px 0;padding:10px 16px;background:rgba(129,140,248,.06);border-radius:0 var(--r-sm) var(--r-sm) 0;font-style:italic;color:var(--text2)}
.prose-bq p{margin:0}
.prose-ul,.prose-ol{margin:8px 0 14px 20px;color:var(--text2)}
.prose-ul li,.prose-ol li{margin-bottom:6px;line-height:1.7;padding-left:4px}
.prose-ul{list-style-type:disc}
.prose-ul li::marker{color:var(--primary)}
.prose-ol{list-style-type:decimal}
.prose-ol li::marker{color:var(--primary);font-weight:700}
.prose-code{font-family:'JetBrains Mono',monospace;font-size:.88em;background:rgba(129,140,248,.12);color:var(--primary);padding:2px 7px;border-radius:5px;border:1px solid rgba(129,140,248,.18)}
.prose strong{color:var(--text);font-weight:700}
.prose em{color:var(--text2);font-style:italic}
/* ---- SKETCHNOTE ---- */
.sk-header{margin-bottom:28px;padding:32px;border-radius:var(--r-xl);border:1px solid var(--border);background:linear-gradient(135deg,rgba(129,140,248,.08),rgba(45,212,191,.04));position:relative;overflow:hidden}
.sk-header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(129,140,248,.15),transparent 70%);pointer-events:none}
.sk-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.22);color:var(--primary);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.sk-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px var(--primary);animation:blink 2.4s ease-in-out infinite}
.sk-course{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px}
.sk-topic{font-family:'Playfair Display',Georgia,serif;font-size:clamp(20px,3vw,32px);font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.2;letter-spacing:-.01em}
.sk-sub{font-size:14px;max-width:560px}
.sk-bigidea{padding:28px;border-radius:var(--r-xl);background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.22);margin-bottom:28px;position:relative;overflow:hidden}
.sk-bigidea::after{content:'';position:absolute;bottom:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(245,158,11,.1),transparent 70%);pointer-events:none}
.sk-bigidea-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:12px}
.sk-bigidea-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.75}
.sk-section-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.sk-section-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sk-section-title{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.sk-section-sub{font-size:13px;color:var(--text2)}
.sk-concepts{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.sk-concept-card{display:flex;gap:14px;align-items:flex-start;padding:18px;border-radius:var(--r-lg);border:1px solid var(--border);background:rgba(255,255,255,.025);transition:border-color .2s;border-left:3px solid var(--cc,var(--primary))}
.sk-concept-card:hover{border-color:var(--cc,var(--primary));background:rgba(255,255,255,.04)}
.sk-concept-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1px solid;margin-top:2px}
.sk-concept-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.35}
.sk-concept-desc{font-size:13px;color:var(--text2);line-height:1.65}
.sk-mistakes{display:grid;gap:10px}
.sk-mistake{display:flex;gap:14px;align-items:flex-start;padding:16px 18px;border-radius:var(--r-md);background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.18);transition:border-color .2s}

.sk-mistake-icon{width:24px;height:24px;border-radius:6px;background:rgba(248,113,113,.15);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;margin-top:1px}

.sk-instructions{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.sk-inst{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:var(--r-md);background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.15);transition:border-color .2s}

.sk-inst-check{width:22px;height:22px;border-radius:6px;background:rgba(52,211,153,.12);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;margin-top:1px}
.sk-inst>div:last-child{font-size:13px;color:var(--text2);line-height:1.6}
.sk-how-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.25);color:var(--primary);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s var(--ease)}
.sk-how-btn:hover{background:rgba(129,140,248,.22);transform:translateY(-2px);box-shadow:0 4px 20px var(--primary-glow)}
/* ---- TABLES ---- */
.prose-table-wrap{overflow-x:auto;margin:14px 0;border-radius:var(--r-md);border:1px solid var(--border)}
.prose-table{width:100%;border-collapse:collapse;font-size:13px}
.prose-table th{padding:11px 14px;text-align:left;font-weight:700;color:var(--text);background:rgba(129,140,248,.1);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(129,140,248,.22);white-space:nowrap}
.prose-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;line-height:1.65}
.prose-table tbody tr:last-child td{border-bottom:none}
.prose-table tbody tr:hover td{background:rgba(255,255,255,.025)}
.miscards{display:grid;gap:14px}
.miscard{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border)}
.mis-wrong{padding:20px;background:rgba(248,113,113,.06);border-right:1px solid rgba(248,113,113,.15)}
.mis-correct{padding:20px;background:rgba(52,211,153,.04)}
.mis-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.mis-wrong .mis-label{color:var(--red)}
.mis-correct .mis-label{color:var(--green)}
.mis-wrong .mis-label::before{content:'✕';font-size:11px}
.mis-correct .mis-label::before{content:'✓';font-size:12px;font-weight:900}
.miscard .desc{font-size:14px;line-height:1.7}
.mis-why{margin-top:10px;padding:8px 12px;border-radius:8px;background:rgba(0,0,0,.2);font-size:12px;color:var(--text3);font-style:italic;line-height:1.6}
.prob-list{display:grid;gap:14px}
.prob-card{padding:22px;border-radius:var(--r-lg);border:1px solid var(--border);background:rgba(255,255,255,.025);display:flex;gap:16px;align-items:flex-start;transition:border-color .2s var(--ease)}
.prob-card:hover{border-color:var(--border2)}
.prob-num{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,rgba(45,212,191,.15),rgba(45,212,191,.06));color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;margin-top:1px;border:1px solid rgba(45,212,191,.2)}

.prob-hint .prob-tag{color:var(--primary)}
.prob-hint .prob-tag::before{content:'💡';font-style:normal}
.prob-sol .prob-tag{color:var(--teal)}
.prob-sol .prob-tag::before{content:'✓';font-size:12px;font-weight:900}
.prob-hint .desc,.prob-sol .desc{font-size:13px;color:var(--text2)}
.tip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.exam-tip{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:var(--r-md);font-size:13px;font-weight:600;background:rgba(245,158,11,.07);color:var(--text2);border:1px solid rgba(245,158,11,.18);line-height:1.5;transition:border-color .2s var(--ease)}
.exam-tip:hover{border-color:rgba(245,158,11,.35)}
.exam-tip-star{font-size:14px;flex-shrink:0;margin-top:1px}

/* ---- ANIMATIONS ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ---- MODAL ---- */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .22s var(--ease)}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:#0D1424;border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:0 40px 100px rgba(0,0,0,.7);width:min(720px,100%);max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s var(--ease)}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head h3{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;color:var(--text);margin:0}
.modal-close{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;line-height:1}
.modal-close:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.3);color:var(--red)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(148,163,255,.2);border-radius:99px}
.modal-prompt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);line-height:1.75;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--r-md);padding:18px}
.modal-copy{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r-md);background:var(--primary);color:#fff;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s var(--ease);margin-top:14px}
.modal-copy:hover{background:#6366F1;transform:translateY(-1px)}
.modal-copy.copied{background:rgba(52,211,153,.8)}
/* ---- RESPONSIVE ---- */
@media(max-width:1120px){
  .layout{grid-template-columns:1fr}
  .side{position:static;max-height:none}
  .two{grid-template-columns:1fr}
}

@media(max-width:760px){
  .page{padding:16px 14px 56px}
  .seg{grid-template-columns:1fr}
  .pane{padding:20px 16px 24px}
  .tabs{padding:0 14px}
  .miscard{grid-template-columns:1fr}
  .mis-wrong{border-right:none;border-bottom:1px solid rgba(248,113,113,.15)}
  .tip-grid{grid-template-columns:1fr}
  .prob-card{flex-direction:column;gap:10px}
}

<body>
<div id="prompt-modal" class="modal-backdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <h3>Generation prompt</h3>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="muted" style="font-size:13px;margin-bottom:14px">This is the exact prompt sent to the image generator to produce this sketchnote.</div>
      <div class="modal-prompt" id="modal-prompt-text"></div>
      <button class="modal-copy" id="modal-copy-btn">Copy prompt</button>
    </div>
  </div>
</div>
<div class="page">
  <div class="top">
    <a class="back" href="index.html">Back to library</a>
    <div class="muted" id="kicker" style="font-size:12px;font-weight:600"></div>
  </div>
  <div id="app"></div>
</div>
<script>
const CA=window.COURSE_ATLAS||{videos:{},course_colors:{},course_labels:{}};const q=new URLSearchParams(location.search),ID=q.get('id'),T=+q.get('t')||0;
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));
const trim=s=>{s=String(s||'');const i=s.indexOf(':');return i>=0?s.slice(i+1).trim():s};
const dur=n=>{n=+n||0;const h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=Math.round(n%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`};
const rt=t=>Math.max(1,Math.round(String(t||'').trim().split(/\s+/).filter(Boolean).length/180));
const md=t=>{
  if(!t)return'';
  // inline: escape HTML first, then apply inline markdown
  const inl=s=>{
    let r=String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    r=r.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    r=r.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    r=r.replace(/__(.+?)__/g,'<strong>$1</strong>');
    r=r.replace(/\*(.+?)\*/g,'<em>$1</em>');
    r=r.replace(/_([^_]+)_/g,'<em>$1</em>');
    r=r.replace(/`([^`]+)`/g,'<code class="prose-code">$1</code>');
    return r;
  };
  const lines=t.split('\n');
  let out='',inUL=false,inOL=false,inBQ=false,buf='';
  const closeUL=()=>{if(inUL){out+='</ul>';inUL=false}};
  const closeOL=()=>{if(inOL){out+='</ol>';inOL=false}};
  const closeBQ=()=>{if(inBQ){out+='</blockquote>';inBQ=false}};
  const flushBuf=()=>{if(buf.trim()){out+=`<p>${buf.trim()}</p>`}buf=''};
  const closeAll=()=>{closeUL();closeOL();closeBQ();flushBuf()};
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const raw=line.trim();
    // blank line
    if(!raw){closeAll();continue}
    // h1
    const m1=raw.match(/^#\s+(.+)$/);
    if(m1){closeAll();out+=`<h2 class="prose-h1">${inl(m1[1])}</h2>`;continue}
    // h2
    const m2=raw.match(/^##\s+(.+)$/);
    if(m2){closeAll();out+=`<h3 class="prose-h2">${inl(m2[1])}</h3>`;continue}
    // h3 / h4+
    const m3=raw.match(/^#{3,}\s+(.+)$/);
    if(m3){closeAll();out+=`<h4 class="prose-h3">${inl(m3[1])}</h4>`;continue}
    // hr
    if(/^[-*_]{3,}$/.test(raw)){closeAll();out+='<hr class="prose-hr">';continue}
    // blockquote
    const bq=raw.match(/^>\s*(.*)$/);
    if(bq){flushBuf();closeUL();closeOL();if(!inBQ){out+='<blockquote class="prose-bq">';inBQ=true}out+=`<p>${inl(bq[1])}</p>`;continue}
    closeBQ();
    // unordered list
    const ul=raw.match(/^[-*+]\s+(.+)$/);
    if(ul){flushBuf();closeOL();if(!inUL){out+='<ul class="prose-ul">';inUL=true}out+=`<li>${inl(ul[1])}</li>`;continue}
    // ordered list
    const ol=raw.match(/^\d+[.)]\s+(.+)$/);
    if(ol){flushBuf();closeUL();if(!inOL){out+='<ol class="prose-ol">';inOL=true}out+=`<li>${inl(ol[1])}</li>`;continue}
    // table — collect all consecutive pipe rows
    if(raw.startsWith('|')){
      flushBuf();closeUL();closeOL();closeBQ();
      const rows=[raw];
      while(i+1<lines.length&&lines[i+1].trim().startsWith('|')){i++;rows.push(lines[i].trim())}
      const parseRow=r=>r.split('|').map(c=>c.trim()).filter((_,j,a)=>j>0&&j<a.length-1);
      const hrow=parseRow(rows[0]);
      const hasSep=rows.length>1&&/^[\s|:\-]+$/.test(rows[1].replace(/\|/g,''));
      const drows=hasSep?rows.slice(2):rows.slice(1);
      out+='<div class="prose-table-wrap"><table class="prose-table"><thead><tr>';
      hrow.forEach(h=>{out+=`<th>${inl(h)}</th>`});
      out+='</tr></thead><tbody>';
      drows.forEach(r=>{const cells=parseRow(r);if(!cells.length)return;out+='<tr>';cells.forEach(c=>{out+=`<td>${inl(c)}</td>`});out+='</tr>'});
      out+='</tbody></table></div>';
      continue;
    }
    // normal text — accumulate into paragraph
    closeUL();closeOL();
    buf+=(buf?'<br>':'')+inl(line);
  }
  closeAll();
  return out;
};
function chAt(ch,s){let c=null;(ch||[]).forEach(x=>{if((+x.start_sec||0)<=+s)c=x});return c}
function y(m,s){return `${m.youtube_url}&t=${Math.max(0,Math.round(+s||0))}`}
if(!ID||!CA.videos[ID]){app.innerHTML='<div class="panel" style="padding:48px;text-align:center"><div style="font-family:\'Playfair Display\',Georgia,serif;font-size:28px;font-weight:700;color:#EEF0FF;margin-bottom:12px">Video not found</div><div style="color:#8892B8">Go back to the library and choose a generated lecture page.</div></div>'}else{
const V=CA.videos[ID],M=V.meta||{},CH=((V.chapters||{}).chapters)||[],TR=((V.transcript||{}).segments)||[],SG=V.study_guide||{},FC=((V.flashcards||{}).cards)||[],QZ=((V.quiz||{}).questions)||[],CN=V.concepts||{nodes:[],edges:[]},EX=V.extras||{},COL=CA.course_colors[M.course_id]||'#818CF8';
document.title=`${trim(M.title||ID)} | Course Atlas`;kicker.textContent=`${M.course_label||M.course||'Lecture'} · ${CH.length} chapters · ${FC.length} flashcards`;
const thumb=(V.sketchnote_image||M.thumbnail_url)?`<img src="${V.sketchnote_image||M.thumbnail_url}" alt="${esc(M.title)}">`:`<div class="fallback">${esc((M.course_label||'LE').slice(0,2).toUpperCase())}</div>`;
app.innerHTML=`<div class="layout"><aside class="panel side"><div class="thumb">${thumb}</div><div class="pill" style="background:${COL}18;color:${COL};border:1px solid ${COL}28">${esc(M.course_label||M.course||'Lecture')}</div><h1>${esc(trim(M.title||ID))}</h1><div class="meta"><div class="box"><span class="ml">Duration</span>${esc(dur(M.duration_sec))}</div><div class="box"><span class="ml">Transcript</span>${TR.length} timed segments</div><div class="box"><span class="ml">Study assets</span>${FC.length} flashcards &middot; ${QZ.length} quiz items</div></div><div class="btns"><a class="btn dark" href="${esc(M.youtube_url||'#')}" target="_blank">Open on YouTube</a><a class="btn soft" href="index.html#graph">Concept graph</a></div><div class="rail"><h3>Chapter rail</h3>${CH.map(c=>`<a class="jump seek-link" href="${esc(y(M,c.start_sec||0))}" data-seek="${Math.max(0,Math.round(c.start_sec||0))}"><div class="time">${esc(c.timestamp_display||dur(c.start_sec||0))}</div><div>${esc(c.title||'Untitled chapter')}</div></a>`).join('')}</div></aside><main class="panel content"><div class="player-box"><div class="player-head"><strong>Watch lecture</strong><div class="muted" style="font-size:13px">Transcript syncs with playback</div></div><div class="player-stack"><div class="embed main-embed"><div id="yt-player" title="YouTube player for ${esc(M.title||ID)}"></div></div></div></div><div class="box"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px">Lecture overview</div><div class="desc">${esc(EX.one_liner||((CH[0]||{}).summary)||'This lecture has transcript, chapter, and study artifacts ready.')}</div></div><div class="tabs"><button class="tab" data-t="overview">Overview</button><button class="tab active" data-t="transcript">Transcript</button><button class="tab" data-t="study">Study guide</button><button class="tab" data-t="flashcards">Flashcards</button><button class="tab" data-t="quiz">Quiz</button><button class="tab" data-t="concepts">Concept map</button><button class="tab" data-t="sketchnote">Sketchnote</button><button class="tab" data-t="extras">Extras</button></div><section class="pane" id="p-overview"></section><section class="pane active" id="p-transcript"></section><section class="pane" id="p-study"></section><section class="pane" id="p-flashcards"></section><section class="pane" id="p-quiz"></section><section class="pane" id="p-concepts"></section><section class="pane" id="p-sketchnote"></section><section class="pane" id="p-extras"></section></main></div>`;
const panes=Object.fromEntries([...document.querySelectorAll('.pane')].map(x=>[x.id.replace('p-',''),x]));let built=false;
const TSEG=TR.map((s,i)=>({...s,_idx:i,_end:+((TR[i+1]||{}).start||M.duration_sec||((+s.start||0)+14))}));
let ytPlayerRef=null,ytReady=false,pendingSeek={time:Math.max(0,T),autoplay:false},currentPlaybackSec=Math.max(0,T),activeTranscriptKey='',playbackTimer=null;
function runPendingSeek(){if(!ytReady||!ytPlayerRef||!pendingSeek)return;const t=Math.max(0,Math.round(+pendingSeek.time||0));ytPlayerRef.seekTo(t,true);if(pendingSeek.autoplay)ytPlayerRef.playVideo();pendingSeek=null}
function updateTranscriptHighlight(scroll=false){const rows=[...document.querySelectorAll('#tlist .seg')];let activeRow=null,nextKey='';rows.forEach(r=>{const start=+r.dataset.start||0,end=+r.dataset.end||start+12,isActive=currentPlaybackSec>=start&&currentPlaybackSec<end;r.classList.toggle('active-now',isActive);if(isActive){activeRow=r;nextKey=r.dataset.key||''}});if(activeRow&&scroll&&panes.transcript.classList.contains('active')&&nextKey!==activeTranscriptKey){const tlist=document.getElementById('tlist');if(tlist){const rowRect=activeRow.getBoundingClientRect(),listRect=tlist.getBoundingClientRect();const relTop=rowRect.top-listRect.top+tlist.scrollTop;tlist.scrollTo({top:Math.max(0,relTop-tlist.clientHeight/2+rowRect.height/2),behavior:'smooth'})}}if(nextKey)activeTranscriptKey=nextKey}
function syncPlayback(forceScroll=false){if(!(ytReady&&ytPlayerRef&&typeof ytPlayerRef.getCurrentTime==='function'))return;const sec=+ytPlayerRef.getCurrentTime()||0;currentPlaybackSec=sec;history.replaceState(null,'',`video.html?id=${encodeURIComponent(ID)}&t=${Math.max(0,Math.round(sec))}`);updateTranscriptHighlight(forceScroll)}
function initYouTubePlayer(){if(ytPlayerRef||!(window.YT&&YT.Player))return;ytPlayerRef=new YT.Player('yt-player',{videoId:ID,playerVars:{rel:0,modestbranding:1,start:Math.max(0,T)},events:{onReady(){ytReady=true;runPendingSeek();syncPlayback(true);if(playbackTimer)clearInterval(playbackTimer);playbackTimer=setInterval(()=>syncPlayback(true),900)},onStateChange(){syncPlayback(true)}}})}
window.onYouTubeIframeAPIReady=initYouTubePlayer;
if(window.YT&&YT.Player)initYouTubePlayer();
function setPlaybackTime(sec,autoplay=true){const t=Math.max(0,Math.round(+sec||0));currentPlaybackSec=t;pendingSeek={time:t,autoplay};if(ytReady&&ytPlayerRef){ytPlayerRef.seekTo(t,true);if(autoplay)ytPlayerRef.playVideo()}history.replaceState(null,'',`video.html?id=${encodeURIComponent(ID)}&t=${t}`);updateTranscriptHighlight(false)}
function scrollToPlayer(){
  const player=document.querySelector('.player-box');
  if(player)player.scrollIntoView({behavior:'smooth',block:'start'});
}
document.addEventListener('click',e=>{
  if(e.metaKey||e.ctrlKey||e.shiftKey||e.altKey)return;
  // Named seek-link (timestamp anchors)
  const link=e.target.closest('.seek-link');
  if(link){
    e.preventDefault();
    setPlaybackTime(+(link.dataset.seek||0),true);
    // Chapter rail links → scroll page to player
    if(link.closest('.rail')){
      setTimeout(scrollToPlayer,60);
    }
    return;
  }
  // Whole segment row clicked (transcript)
  const seg=e.target.closest('.seg[data-seek]');
  if(seg){
    e.preventDefault();
    setPlaybackTime(+(seg.dataset.seek||0),true);
  }
});
function show(name){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===name));

/* parse sketchnote prompt into structured sections */
function parseSketchnote(text){
  if(!text)return null;
  const r={topic:'',course:'',bigIdea:'',concepts:[],mistakes:[],instructions:[]};
  let sec='';
  for(const raw of text.split('\n')){
    const t=raw.trim();
    if(!t)continue;
    const mTopic=t.match(/^Topic:\s*(.+)$/i);
    const mCourse=t.match(/^Course:\s*(.+)$/i);
    const mBig=t.match(/^Big idea:\s*(.+)$/i);
    if(mTopic){r.topic=mTopic[1].trim();continue}
    if(mCourse){r.course=mCourse[1].trim();continue}
    if(mBig){r.bigIdea=mBig[1].trim();sec='big';continue}
    if(/^Key concepts/i.test(t)){sec='concepts';continue}
    if(/^Common mistakes/i.test(t)){sec='mistakes';continue}
    if(/^Instructions/i.test(t)){sec='instructions';continue}
    if(t.startsWith('-')){
      const content=t.slice(1).trim();
      if(sec==='concepts'){
        const ci=content.indexOf(':');
        if(ci>0)r.concepts.push({name:content.slice(0,ci).replace(/\.$/, '').trim(),desc:content.slice(ci+1).trim()});
        else r.concepts.push({name:content,desc:''});
      }else if(sec==='mistakes'){r.mistakes.push(content)}
      else if(sec==='instructions'){r.instructions.push(content)}
    }else if(sec==='big'&&!(/^Key|^Common|^Instruct/i.test(t))){
      r.bigIdea+=(r.bigIdea?' ':'')+t;
    }
  }
  return r;
}

    <div class="sk-section-sub">Each concept will have its own visual cluster in the sketchnote</div>
  </div>
</div>
<div class="sk-concepts">
  ${sk.concepts.map((c,i)=>`
  <div class="sk-concept-card" style="--cc:${conceptColors[i%conceptColors.length]}">
    <div class="sk-concept-num" style="background:${conceptColors[i%conceptColors.length]}22;color:${conceptColors[i%conceptColors.length]};border-color:${conceptColors[i%conceptColors.length]}44">${i+1}</div>
    <div>
      <div class="sk-concept-name">${esc(c.name)}</div>
      <div class="sk-concept-desc">${esc(c.desc)}</div>
    </div>
  </div>`).join('')}
</div>`:''}

${sk.mistakes.length?`
<div class="sk-section-head" style="margin-top:32px">
  <div class="sk-section-icon">⚠️</div>
  <div>
    <div class="sk-section-title">Common mistakes to call out</div>
    <div class="sk-section-sub">These will appear in a "Watch Out" warning panel in the sketchnote</div>
  </div>
</div>
<div class="sk-mistakes">
  ${sk.mistakes.map(m=>`<div class="sk-mistake"><div class="sk-mistake-icon">✕</div><div class="sk-mistake-text">${esc(m)}</div></div>`).join('')}
</div>`:''}

${sk.instructions.length?`
<div class="sk-section-head" style="margin-top:32px">
  <div class="sk-section-icon">🎨</div>
  <div>
    <div class="sk-section-title">Visual style instructions</div>
    <div class="sk-section-sub">How the final artwork will be styled</div>
  </div>
</div>
<div class="sk-instructions">
  ${sk.instructions.map(inst=>`<div class="sk-inst"><div class="sk-inst-check">✓</div><div>${esc(inst)}</div></div>`).join('')}
</div>`:''}
`;
})();


/* EXTRAS PANE */
panes.extras.innerHTML=`<div class="section"><h2>Extras</h2><div class="muted">Support material for recall, teaching-back, and extension.</div></div>${((EX.eli5||{}).explanation)?`<div class="item" style="margin-bottom:14px"><h3>${esc((EX.eli5||{}).analogy||'Simplified framing')}</h3><div class="desc">${esc((EX.eli5||{}).explanation)}</div></div>`:''}${(EX.prerequisites||[]).length?`<div class="section" style="margin-top:20px"><h2>Prerequisites</h2><div class="two">${(EX.prerequisites||[]).map(p=>`<div class="item"><h3>${esc(p.concept||p)}</h3><div class="desc">${esc(p.why_needed||'')}</div></div>`).join('')}</div></div>`:''}${(EX.key_quotes||[]).length?`<div class="section" style="margin-top:20px"><h2>Key quotes</h2><div class="two">${(EX.key_quotes||[]).map(k=>`<div class="item"><h3 style="font-size:15px;line-height:1.5;font-style:italic;color:var(--text2)">&ldquo;${esc(k.quote||'')}&rdquo;</h3><div class="muted" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin:8px 0">Near ${esc(dur(k.timestamp_sec||0))}</div><div class="desc">${esc(k.why_it_matters||'')}</div><div class="row" style="margin-top:12px"><a class="btn soft seek-link" href="${esc(y(M,k.timestamp_sec||0))}" data-seek="${Math.max(0,Math.round(k.timestamp_sec||0))}">Jump in player</a></div></div>`).join('')}</div></div>`:''}${(EX.common_traps||[]).length?`<div class="section" style="margin-top:20px"><h2>Common traps</h2><div class="two">${(EX.common_traps||[]).map(t=>`<div class="item"><h3 style="color:var(--red)">${esc(t.trap||'')}</h3><div class="desc">${esc(t.consequence||'')}</div><div class="muted" style="margin-top:10px;font-size:13px"><strong style="color:var(--green)">Fix:</strong> ${esc(t.fix||'')}</div></div>`).join('')}</div></div>`:''}${(EX.real_world_applications||[]).length?`<div class="section" style="margin-top:20px"><h2>Real-world applications</h2><div class="two">${(EX.real_world_applications||[]).map(a=>`<div class="item"><h3>${esc(a.application||a)}</h3><div class="desc">${esc(a.how||'')}</div></div>`).join('')}</div></div>`:''}${EX.teach_back_prompt?`<div class="section" style="margin-top:20px"><h2>Teach-back prompt</h2><div class="item" style="border-left:3px solid var(--primary);border-radius:0 var(--r-lg) var(--r-lg) 0"><div class="desc">${esc(EX.teach_back_prompt)}</div></div></div>`:''}${(EX.further_reading||[]).length?`<div class="section" style="margin-top:20px"><h2>Further reading</h2><div class="two">${(EX.further_reading||[]).map(r=>`<div class="item"><h3>${esc(r.title||r.resource||'Resource')}</h3><div class="muted" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">${esc(r.type||'resource')}</div><div class="desc">${esc(r.relevance||r.description||'')}</div></div>`).join('')}</div></div>`:''}`;

/* ---- MODAL ---- */
(()=>{
  const backdrop=document.getElementById('prompt-modal');
  const promptEl=document.getElementById('modal-prompt-text');
  const copyBtn=document.getElementById('modal-copy-btn');
  const closeBtn=document.getElementById('modal-close-btn');
  function openModal(text){promptEl.textContent=text;backdrop.classList.add('open');document.body.style.overflow='hidden'}
  function closeModal(){backdrop.classList.remove('open');document.body.style.overflow=''}
  closeBtn.onclick=closeModal;
  backdrop.onclick=e=>{if(e.target===backdrop)closeModal()};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
  copyBtn.onclick=()=>{navigator.clipboard.writeText(promptEl.textContent||'').then(()=>{copyBtn.textContent='Copied!';copyBtn.classList.add('copied');setTimeout(()=>{copyBtn.textContent='Copy prompt';copyBtn.classList.remove('copied')},2000)})};
  window._openPromptModal=openModal;
})();
window.addEventListener('beforeunload',()=>{if(playbackTimer)clearInterval(playbackTimer)});
}
</script>
</body>
</html>
